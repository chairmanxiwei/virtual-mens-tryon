name: CI-CD

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: node-server/package-lock.json
      - run: npm ci
      - run: npm test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m compileall server/src

  deploy_production:
    if: github.ref == 'refs/heads/main'
    needs: [node, python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 部署到生产机
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            export REPO_URL="${{ secrets.REPO_URL }}"
            export BRANCH="main"
            cd /root/虚拟男装/current || true
            bash /root/虚拟男装/current/deploy.sh

      - name: 生产健康检查
        id: prod_health
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            bash /root/虚拟男装/current/health-check.sh

      - name: 失败自动回滚
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            bash /root/虚拟男装/current/rollback.sh
