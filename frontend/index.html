<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 穿搭推荐系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 穿搭推荐系统</h1>
            <nav>
                <ul>
                    <li><button class="nav-btn active" data-section="temperature">温度查询</button></li>
                    <li><button class="nav-btn" data-section="recommendation">穿搭推荐</button></li>
                    <li><button class="nav-btn" data-section="virtual-tryon">虚拟试衣</button></li>
                </ul>
            </nav>
        </header>

        <main>
            <!-- 温度查询模块 -->
            <section id="temperature" class="section active">
                <h2>温度查询</h2>
                <div class="form-group">
                    <label for="city">城市名：</label>
                    <input type="text" id="city" placeholder="请输入城市名" value="北京">
                    <button id="query-weather" class="btn">查询温度</button>
                </div>
                <div id="weather-result" class="result-container"></div>
            </section>

            <!-- 穿搭推荐模块 -->
            <section id="recommendation" class="section">
                <h2>穿搭推荐</h2>
                <div class="form-group">
                    <label for="scene">场景：</label>
                    <select id="scene">
                        <option value="商务会议">商务会议</option>
                        <option value="休闲约会">休闲约会</option>
                        <option value="日常通勤">日常通勤</option>
                        <option value="运动健身">运动健身</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="user-id">用户ID：</label>
                    <input type="number" id="user-id" value="123" min="1">
                </div>
                <button id="generate-recommendation" class="btn">生成穿搭推荐</button>
                <div id="recommendation-result" class="result-container"></div>
            </section>

            <!-- 虚拟试衣模块 -->
            <section id="virtual-tryon" class="section">
                <h2>虚拟试衣</h2>
                <div class="form-group">
                    <label>人物照片：</label>
                    <div class="upload-options">
                        <input type="text" id="person-image-url" placeholder="输入图片URL">
                        <input type="file" id="person-image-file" accept="image/*">
                    </div>
                </div>
                <div class="form-group">
                    <label>衣物照片：</label>
                    <div class="upload-options">
                        <input type="text" id="garment-image-url" placeholder="输入图片URL">
                        <input type="file" id="garment-image-file" accept="image/*">
                    </div>
                </div>
                <div class="form-group">
                    <label for="garment-type">衣物类型：</label>
                    <select id="garment-type">
                        <option value="top">上装</option>
                        <option value="bottom">下装</option>
                        <option value="dress">连衣裙</option>
                    </select>
                </div>
                <button id="generate-tryon" class="btn">生成试衣效果</button>
                <div id="tryon-result" class="result-container"></div>
            </section>
        </main>

        <footer>
            <p>© 2026 AI 穿搭推荐系统</p>
        </footer>
    </div>

    <!-- 加载动画 -->
    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <p>加载中...</p>
    </div>

    <!-- 提示消息 -->
    <div id="message" class="message"></div>

    <script src="script.js"></script>
</body>
</html>
